# This rule is not used by the project platform-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to database.platform.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: platform-operator
    app.kubernetes.io/managed-by: kustomize
  name: database-pgdatabase-viewer-role
rules:
- apiGroups:
  - database.platform.io
  resources:
  - pgdatabases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - database.platform.io
  resources:
  - pgdatabases/status
  verbs:
  - get
