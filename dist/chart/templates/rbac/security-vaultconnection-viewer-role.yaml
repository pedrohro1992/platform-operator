{{- if .Values.rbacHelpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: platform-operator
    name: platform-operator-security-vaultconnection-viewer-role
rules:
    - apiGroups:
        - security.platform.io
      resources:
        - vaultconnections
      verbs:
        - get
        - list
        - watch
    - apiGroups:
        - security.platform.io
      resources:
        - vaultconnections/status
      verbs:
        - get
{{- end }}
